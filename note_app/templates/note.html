{% comment %} note.html {% endcomment %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NoteNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="{% url 'home' %}" class="navbar-brand">📝 NoteNest</a>
        <a href="{% url 'login' %}" class="navbar-brand">Logout</a> 

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="card-title">{{ get_notes.title }}</h3>
            <hr>

            <pre class="card-text">{{ get_notes.content }}</pre>

            <hr>

            <a href="{% url 'update_note' get_notes.id %}" class="btn btn-warning">Edit</a>

            <a href="{% url 'del_note' get_notes.id %}" class="btn btn-danger">Delete</a>

            <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>

        </div>
    </div>

</div>

</body>
</html>
