<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NoteNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">📝 NoteNest</a>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>All Notes</h2>
        <a href="{% url 'add_note' %}" class="btn btn-primary">+ Add Note</a>
    </div>

    {% for note in notes %}

    <div class="card mb-3 shadow-sm">
        <div class="card-body">

            <h5 class="card-title mb-1">
                <a href="{% url 'notes' note.id %}" class="text-decoration-none">
                    {{ note.title }}
                </a>
            </h5>

            <small class="text-muted">
                Created: {{ note.created_at|date:"d M Y • H:i" }}
            </small>

        </div>
    </div>

    {% endfor %}

</div>

</body>
</html>
