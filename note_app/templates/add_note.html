<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add Note | NoteNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="{% url 'home' %}" class="navbar-brand">📝 NoteNest</a>
        <a href="{% url 'login' %}" class="navbar-brand">Logout</a> 

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="mb-4">Add New Note</h3>

            <form action="{% url 'add_note' %}" method="post">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label" >Title</label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Note</label>
                    <textarea name="note" rows="8" class="form-control" required></textarea>
                </div>

                <button type="submit" class="btn btn-success">Save Note</button>

                <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
