<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Update Note | NoteNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="{% url 'home' %}" class="navbar-brand">📝 NoteNest</a>
        <a href="{% url 'login' %}" class="navbar-brand">Logout</a> 

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="mb-4">Update Note</h3>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" value="{{ u_note.title }}" class="form-control" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Note</label>
                    <textarea name="content" rows="8" class="form-control">{{ u_note.content }}</textarea>
                </div>

                <button type="submit" class="btn btn-warning">Save Note</button>

                <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
